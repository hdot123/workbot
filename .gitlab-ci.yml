# workbot GitLab CI — minimal dry-run pipeline
#
# No git push, no production deploy, no Factory trigger, no Linear mutation.

stages:
  - lint
  - security
  - validate
  - test
  - dry-run

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "50"

# === lint jobs ===

json-valid:
  stage: lint
  script:
    - echo "Validating JSON files with Python pathlib..."
    - |
      python3 << 'PYEOF'
      import json, pathlib, sys
      repo = pathlib.Path('.')
      skip_dirs = {'.git', 'node_modules', '.venv'}
      pass_count = 0
      fail_count = 0
      skip_count = 0
      failures = []
      for p in sorted(repo.rglob('*.json')):
          if skip_dirs & set(p.parts):
              continue
          # skip broken symlinks (e.g. mcporter.json pointing to local host path)
          if p.is_symlink() and not p.exists():
              skip_count += 1
              continue
          try:
              json.loads(p.read_text(encoding='utf-8'))
              pass_count += 1
          except Exception as e:
              fail_count += 1
              failures.append((str(p), str(e)))
      print(f'JSON: PASS={pass_count} FAIL={fail_count} SKIP_BROKEN_SYMLINK={skip_count}')
      for path, err in failures:
          print(f'FAIL: {path} — {err}')
      sys.exit(1 if fail_count > 0 else 0)
      PYEOF
  rules:
    - exists:
        - "**/*.json"

yaml-valid:
  stage: lint
  script:
    - |
      PASS=0; FAIL=0
      echo "Validating YAML files..."
      for f in $(find . -name "*.yml" -o -name "*.yaml" | grep -v '.git/' | grep -v 'node_modules/' | grep -v '.venv/' 2>/dev/null); do
        if python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
          PASS=$((PASS+1))
        else
          echo "FAIL: $f"; FAIL=$((FAIL+1))
        fi
      done
      echo "YAML: PASS=$PASS FAIL=$FAIL"
      [ "$FAIL" -eq 0 ] || exit 1
  rules:
    - exists:
        - "**/*.yml"
        - "**/*.yaml"
  allow_failure: true

shell-syntax:
  stage: lint
  script:
    - |
      PASS=0; FAIL=0
      echo "Checking shell script syntax..."
      for f in $(find . -name "*.sh" -not -path "./.git/*" 2>/dev/null); do
        if bash -n "$f" 2>/dev/null; then
          PASS=$((PASS+1))
        else
          echo "FAIL: $f"; FAIL=$((FAIL+1))
        fi
      done
      echo "Shell: PASS=$PASS FAIL=$FAIL"
      [ "$FAIL" -eq 0 ] || exit 1
  rules:
    - exists:
        - "**/*.sh"

# === security jobs ===

secrets-check:
  stage: security
  script:
    - echo "Checking for leaked secrets..."
    - |
      python3 << 'PYEOF'
      import re, pathlib, sys
      PATTERNS = [
          (re.compile(r'glpat-[a-zA-Z0-9]{20,}'), 'glpat- token'),
          (re.compile(r'-----BEGIN[A-Z ]*PRIVATE KEY-----'), 'Private key'),
      ]
      # exclude self (scanner rules) and legacy quarantine dirs
      skip_dirs = {'.git', 'node_modules', '.venv'}
      skip_name = {'.gitlab-ci.yml'}
      skip_path_parts = ['memory-legacy-quarantine-']
      found = 0
      repo = pathlib.Path('.')
      for p in sorted(repo.rglob('*')):
          if not p.is_file():
              continue
          if skip_dirs & set(p.parts):
              continue
          if p.name in skip_name:
              continue
          if any(s in str(p) for s in skip_path_parts):
              continue
          if p.suffix not in ('.json', '.yml', '.yaml', '.env', '.sh', '.py', '.ts', '.js', '.md', '.toml'):
              continue
          try:
              text = p.read_text(encoding='utf-8', errors='ignore')
          except Exception:
              continue
          for pat, label in PATTERNS:
              for m in pat.finditer(text):
                  print(f'FOUND: {label} in {p}')
                  found += 1
                  break
      if found:
          print(f'FAIL: {found} secret(s) detected!')
          sys.exit(1)
      print('PASS: No secrets found (standard check)')
      PYEOF
  rules:
    - exists:
        - "**/*.json"
        - "**/*.yml"
        - "**/*.yaml"

secret-scan-workbot:
  stage: security
  script:
    - echo "Scanning workbot codebase for secrets..."
    - |
      python3 << 'PYEOF'
      import re, pathlib, sys
      PATTERNS = [
          (re.compile(r'glpat-[a-zA-Z0-9]{20,}'), 'glpat- token'),
          (re.compile(r'(?<![${])sk-[a-zA-Z0-9]{20,}'), 'sk- key'),
          (re.compile(r'-----BEGIN[A-Z ]*PRIVATE KEY-----'), 'Private key'),
          (re.compile(r'lin_api_[a-zA-Z0-9]{20,}'), 'lin_api_ token'),
          (re.compile(r'fk-[a-zA-Z0-9]{20,}'), 'fk- key'),
      ]
      BEARER_RE = re.compile(r'Authorization:\s*Bearer\s+\S+', re.IGNORECASE)
      PLACEHOLDER_VALUES = {'PLACEHOLDER', '<PLACEHOLDER>', 'REDACTED', 'REDACTED-EXAMPLE',
                            '<REDACTED-EXAMPLE>', '<YOUR_TOKEN>', '<TOKEN>', '<API_KEY>',
                            '<service-key>', '<supabase-service-role-key>',
                            '<SUPABASE_ANON_KEY>', '<APISIX_CLIENT_KEY>'}
      # exclude self (scanner rules) and legacy quarantine dirs
      skip_dirs = {'.git', 'node_modules', '.venv'}
      skip_name = {'.gitlab-ci.yml'}
      # Supabase publishable/anon keys are safe to expose in client code
      skip_path_parts = ['memory-legacy-quarantine-', '.claude/settings']
      found = 0
      repo = pathlib.Path('.')
      for p in sorted(repo.rglob('*')):
          if not p.is_file():
              continue
          if skip_dirs & set(p.parts):
              continue
          if p.name in skip_name:
              continue
          # legacy quarantine docs excluded from active workbot secret scan
          if any(s in str(p) for s in skip_path_parts):
              continue
          if p.suffix not in ('.py', '.yml', '.yaml', '.json', '.env', '.sh', '.md', '.toml'):
              continue
          try:
              text = p.read_text(encoding='utf-8', errors='ignore')
          except Exception:
              continue
          for pat, label in PATTERNS:
              for m in pat.finditer(text):
                  val = m.group(0)
                  if 'PLACEHOLDER' in val.upper():
                      continue
                  print(f'FOUND: {label} in {p}')
                  found += 1
                  break
          # Bearer check: match line, then inspect the token value
          for line_no, line in enumerate(text.splitlines(), 1):
              m = BEARER_RE.search(line)
              if not m:
                  continue
              if 'PLACEHOLDER' in line.upper():
                  continue
              # extract token part after "Bearer "
              token_val = m.group(0).split('Bearer', 1)[1].strip()
              # strip surrounding punctuation for placeholder detection
              token_clean = token_val.strip('`"\'()>,;')
              if not token_clean:
                  continue
              # detect angle-bracket placeholders before stripping ate the >
              has_angle_placeholder = ('<' in token_val and '>' in token_val)
              # skip obvious placeholders: angle-bracket templates, variables
              if has_angle_placeholder:
                  continue
              if token_clean.startswith('$'):
                  continue
              # skip if token looks like a fake/example value
              fake_indicators = ['totally-wrong', 'xxx', 'example', 'test-token', 'your-',
                                 'xxx.', 'sb_publishable_', 'anon_key', 'REDACTED']
              if any(ind in token_val for ind in fake_indicators):
                  continue
              if token_clean in PLACEHOLDER_VALUES:
                  continue
              print(f'FOUND: Bearer token in {p} (line {line_no})')
              found += 1
      if found:
          print(f'FAIL: {found} secret(s) detected!')
          sys.exit(1)
      print('PASS: No secrets found in workbot')
      PYEOF

# === validate jobs ===

yaml-baseline-parse:
  stage: validate
  script:
    - echo "Validating webhook ingress YAML baseline..."
    - |
      python3 << 'PYEOF'
      import yaml, json
      yaml.safe_load(open('workspace/tools/webhook_ingress/routes.yaml'))
      print('routes.yaml: OK')
      json.load(open('workspace/tools/webhook_ingress/schemas/canonical-webhook-event-v1.json'))
      print('canonical schema: OK')
      PYEOF
  allow_failure: true

# === test jobs ===

webhook-ingress-pytest:
  stage: test
  script:
    - python3 -m pip install --quiet pytest pyyaml fastapi uvicorn httpx psycopg2-binary pytest-asyncio
    - python3 -m pytest tests/test_webhook_ingress.py tests/test_webhook_ingress_server.py -q
  allow_failure: true
  rules:
    - changes:
        - workspace/tools/webhook_ingress/**/*
        - tests/test_webhook_ingress.py
        - tests/test_webhook_ingress_server.py
      when: on_success

# === dry-run jobs ===

github-push-gate-dry-run:
  stage: dry-run
  script:
    - echo "=== GitHub Push Gate Dry-Run ==="
    - echo "Verifying gate-check logic..."
    - |
      WF=".github/workflows/memory-core-auto-sync-deploy.yml"
      if [ ! -f "$WF" ]; then
        echo "FAIL: workflow file not found"; exit 1
      fi
      if grep -q 'passed=true' "$WF"; then
        echo "FAIL: gate-check contains passed=true — not fail-closed"; exit 1
      fi
      if grep -qE '^  schedule:' "$WF"; then
        echo "FAIL: schedule is not commented out"; exit 1
      fi
      PUSH_COUNT=$(grep -c 'git push origin HEAD:main' "$WF" || true)
      if [ "$PUSH_COUNT" -eq 0 ]; then
        echo "FAIL: no git push lines found"; exit 1
      fi
      echo "gate-check is fail-closed: OK"
      echo "schedule is disabled: OK"
      echo "git push lines under gate-check: OK ($PUSH_COUNT occurrences)"
      echo "PASS: GitHub push gate dry-run verified"
