name: memory-hook-external-core-only

on:
  pull_request:
    paths:
      - "workspace/tools/**"
      - "tests/**"
      - "docs/m8-external-core-contract-freeze.md"
      - ".github/workflows/memory-hook-external-core-only.yml"
  push:
    branches: [main, master]
    paths:
      - "workspace/tools/**"
      - "tests/**"
      - "docs/m8-external-core-contract-freeze.md"
      - ".github/workflows/memory-hook-external-core-only.yml"

jobs:
  external-core-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install regression dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install openpyxl

      - name: Run M9 core regression set
        run: |
          python3 -m pytest -q \
            tests/test_cmux_control_packet.py \
            tests/test_cmux_runtime_ctl_p8_health_paths.py \
            tests/test_cmux_packet_consumers.py \
            tests/test_youzy_data_replica_hook_p11.py \
            tests/test_cmux_phase_readiness.py \
            tests/test_memory_hook_gateway_m6_batch3_provider_switch.py \
            tests/test_memory_hook_impls_policy_conflict.py \
            tests/test_memory_hook_provider_rollback.py \
            tests/test_memory_hook_gateway.py \
            tests/test_memory_hook_gateway_p7_mainline.py \
            tests/test_cmux_hook_bridge.py \
            tests/test_f8_rollback.py

      - name: Enforce fail-closed when external-core cannot load
        run: |
          set +e
          printf '{"cwd":"%s","session_id":"ci-fail-closed"}\n' "$GITHUB_WORKSPACE" | \
            MEMORY_HOOK_CORE_PROVIDER=external-core \
            MEMORY_HOOK_EXTERNAL_CORE_MODULE=does.not.exist.module \
            python3 workspace/tools/memory_hook_gateway.py \
              --host codex \
              --event session-start \
              --no-delegate
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "ERROR: expected non-zero exit for external-core load failure"
            exit 1
          fi

      - name: Enforce real delegate control-plane path
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cat >"$tmpdir/cmux" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "${1:-}" = "codex-hook" ]; then
            echo '{}'
            exit 0
          fi
          if [ "${1:-}" = "identify" ]; then
            echo '{"caller":{"workspace_ref":"workspace:ci","surface_ref":"surface:ci"}}'
            exit 0
          fi
          exit 1
          EOF
          chmod +x "$tmpdir/cmux"

          printf '{"cwd":"%s","session_id":"ci-real-control-plane"}\n' "$GITHUB_WORKSPACE" | \
            PATH="$tmpdir:$PATH" \
            CMUX_SURFACE_ID="surface:ci" \
            python3 workspace/tools/memory_hook_gateway.py \
              --host codex \
              --event session-start
