name: Webhook Ingress Validation

on:
  pull_request:
    paths:
      - "workspace/tools/webhook_ingress/**"
      - "tests/test_webhook_ingress.py"
      - "docs/webhook-ingress/**"
      - ".github/workflows/webhook-ingress-validation.yml"
  push:
    branches: [main, master]
    paths:
      - "workspace/tools/webhook_ingress/**"
      - "tests/test_webhook_ingress.py"
      - "docs/webhook-ingress/**"
      - ".github/workflows/webhook-ingress-validation.yml"

jobs:
  webhook-ingress-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pyyaml fastapi uvicorn httpx psycopg2-binary pytest-asyncio
      - name: Run webhook ingress tests
        run: python -m pytest tests/test_webhook_ingress.py tests/test_webhook_ingress_server.py -q
