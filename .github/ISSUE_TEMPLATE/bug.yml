name: 缺陷问题
description: Bug、异常、错误行为
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明问题是什么
      placeholder: 请描述问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 应该发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 对用户、功能、环境的影响
      placeholder: 请描述影响范围
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图 / 证据
      placeholder: 粘贴日志、截图、报错信息
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 修复验收标准
      placeholder: |
        - [ ] 问题不再出现
        - [ ] 衍生场景验证通过
        - [ ] 回归测试通过
    validations:
      required: true
